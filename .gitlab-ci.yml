image: node:20

stages:
  - build
  - deploy

build:
  stage: build
  cache:
    key:
      files:
        - website/package-lock.json
    paths:
      - website/node_modules/
  script:
    - cd website
    - npm ci
    - npm run build
  artifacts:
    paths:
      - website/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  script:
    - mv website/dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: https://$CI_PAGES_DOMAIN
