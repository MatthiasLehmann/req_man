# DO-178C / DO-331 Qualitätsprofil für Luftfahrt-Software
name: DO-178C / DO-331
description: >
  Qualitätsprofil für sicherheitskritische Luftfahrt-Software nach DO-178C
  und DO-331 (modellbasierte Entwicklung). Besonderes Augenmerk auf
  Verifikation, Independence und Traceability zu übergeordneten Anforderungen.
norm_references:
  - DO-178C (Software Considerations in Airborne Systems)
  - DO-331 (Model-Based Development and Verification)
  - ARP4754A (Guidelines for Development of Civil Aircraft)
model: claude-sonnet-4-6
min_score: 80
forbidden_keywords:
  - möglichst
  - eventuell
  - ggf.
  - gegebenenfalls
  - ausreichend
  - angemessen
  - benutzerfreundlich
  - schnell
  - typischerweise
  - normalerweise
  - TODO
  - TBD
categories:
  clarity:
    weight: 1.2
    enabled: true
  testability:
    weight: 1.5
    enabled: true
  completeness:
    weight: 1.2
    enabled: true
  consistency:
    weight: 1.0
    enabled: true
  modal_verb:
    weight: 1.0
    enabled: true
additional_criteria:
  - Anforderung muss verifizierbar sein (Prüfmethode ableitbar)
  - Hochsicherheits-Anforderungen (DAL A/B) müssen Verifikationsstrategie benennen
  - Traceability zu übergeordneten High-Level Requirements (HLR) ist obligatorisch
  - Keine impliziten Annahmen über Hardware-Verhalten
  - Fehlerbehandlung muss explizit spezifiziert sein
