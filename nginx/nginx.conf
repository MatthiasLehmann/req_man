events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Upload-Größe für Datei-Uploads
    client_max_body_size 50M;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream website {
        server website:80;
    }

    server {
        listen 80;

        # Backend API
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Backend: hochgeladene Dateien
        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_set_header Host $host;
        }

        # Astro Website – /req_man/* → website-Container (Prefix wird gestripped)
        # Der Browser bekommt Links wie /req_man/assets/... zurück,
        # die hier erneut abgefangen und weitergeleitet werden.
        location /req_man/ {
            proxy_pass http://website/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # React App (SPA) – alles andere
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
